<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Background circle -->
  <circle cx="64" cy="64" r="64" fill="#FF4500"/>
  <!-- Robot head -->
  <rect x="32" y="36" width="64" height="52" rx="12" fill="white"/>
  <!-- Eyes -->
  <circle cx="48" cy="58" r="7" fill="#FF4500"/>
  <circle cx="80" cy="58" r="7" fill="#FF4500"/>
  <!-- Eye highlights -->
  <circle cx="50" cy="56" r="2.5" fill="white"/>
  <circle cx="82" cy="56" r="2.5" fill="white"/>
  <!-- Mouth / speaker grille -->
  <rect x="44" y="72" width="40" height="6" rx="3" fill="#FF4500" opacity="0.7"/>
  <!-- Antenna -->
  <line x1="64" y1="36" x2="64" y2="20" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <circle cx="64" cy="16" r="6" fill="white"/>
  <circle cx="64" cy="16" r="3" fill="#FF4500"/>
  <!-- Ear nodes -->
  <circle cx="26" cy="56" r="6" fill="white"/>
  <circle cx="102" cy="56" r="6" fill="white"/>
  <!-- Pulse wave on forehead -->
  <polyline points="42,46 48,40 54,50 60,42 66,48 72,38 78,46 84,44" 
            fill="none" stroke="#FF4500" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.4"/>
</svg>
