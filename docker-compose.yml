# PulseBoard — Microservice Architecture (Consolidated)
# Usage: docker compose up --build

services:
  # -----------------------------------------------------------------------
  # Infrastructure
  # -----------------------------------------------------------------------
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "8025:8025"
      - "1025:1025"

  # -----------------------------------------------------------------------
  # API Gateway (port 8000 — single entry point for frontend)
  # -----------------------------------------------------------------------
  gateway:
    build:
      context: .
      dockerfile: services/gateway/Dockerfile
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./services/gateway:/app
      - ./services/shared:/shared
      - upload_data:/app/uploads
    depends_on:
      core:
        condition: service_started
      community:
        condition: service_started

  # -----------------------------------------------------------------------
  # Core Service (port 8001 — auth + user + notifications)
  # -----------------------------------------------------------------------
  core:
    build:
      context: .
      dockerfile: services/core/Dockerfile
    env_file:
      - .env
    ports:
      - "8001:8001"
    volumes:
      - ./services/core:/app
      - ./services/shared:/shared
      - upload_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      mailhog:
        condition: service_started

  # -----------------------------------------------------------------------
  # Community Service (port 8002 — forum + moderation + chat)
  # -----------------------------------------------------------------------
  community:
    build:
      context: .
      dockerfile: services/community/Dockerfile
    env_file:
      - .env
    environment:
      - SEED_DEFAULT_CATEGORIES_ON_STARTUP=true
    ports:
      - "8002:8002"
    volumes:
      - ./services/community:/app
      - ./services/shared:/shared
      - upload_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # -----------------------------------------------------------------------
  # Frontend (port 5173)
  # -----------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
    env_file:
      - .env
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - gateway

volumes:
  postgres_data:
  redis_data:
  upload_data:
